name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current commit
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: npm ci

      - name: Build
        if: steps.tag_check.outputs.exists == 'false'
        run: npm run build

      - name: Package extension
        if: steps.tag_check.outputs.exists == 'false'
        run: npx @vscode/vsce package

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Generate changelog
        if: steps.tag_check.outputs.exists == 'false'
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s|%h" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s|%h" "${PREV_TAG}..HEAD")
          fi

          FEATURES=""
          FIXES=""
          OTHER=""

          while IFS='|' read -r msg hash; do
            [ -z "$msg" ] && continue
            # Skip CI and chore commits
            case "$msg" in ci:*|ci\(*|chore:*|chore\(*) continue;; esac

            case "$msg" in
              feat:*|feat\(*)
                clean="${msg#feat: }"
                clean="${clean#feat(*): }"
                FEATURES="${FEATURES}- ${clean} (\`${hash}\`)"$'\n'
                ;;
              fix:*|fix\(*)
                clean="${msg#fix: }"
                clean="${clean#fix(*): }"
                FIXES="${FIXES}- ${clean} (\`${hash}\`)"$'\n'
                ;;
              *)
                OTHER="${OTHER}- ${msg} (\`${hash}\`)"$'\n'
                ;;
            esac
          done <<< "$COMMITS"

          BODY=""
          [ -n "$FEATURES" ] && BODY="${BODY}### Features"$'\n'"${FEATURES}"$'\n'
          [ -n "$FIXES" ] && BODY="${BODY}### Fixes"$'\n'"${FIXES}"$'\n'
          [ -n "$OTHER" ] && BODY="${BODY}### Other"$'\n'"${OTHER}"$'\n'

          # Write to file to avoid escaping issues
          echo "$BODY" > release_notes.md

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: "*.vsix"

      - name: Publish to VS Code Marketplace
        if: steps.tag_check.outputs.exists == 'false'
        run: npx @vscode/vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
